<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Visual Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #111111;
            --surface: #1a1a1a;
            --border: #333333;
            --text: #ffffff;
            --text2: #aaaaaa;
            --red: #e62525;
            --red-dim: rgba(230, 37, 37, 0.15);
            --red-hover: #ff3333;
        }
        body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; -webkit-font-smoothing: antialiased; padding-bottom: 80px;}
        .container { max-width: 1000px; margin: 0 auto; padding: 2rem 2rem 5rem; }
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; margin: 0;}
        
        .box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 2rem; margin-bottom: 2rem; }
        .box h2 { font-size: 1.2rem; margin-top: 0; margin-bottom: 1.5rem; color: var(--text); }
        
        label { display: block; font-size: 0.85rem; color: var(--text2); margin-bottom: 0.5rem; font-family: 'Pretendard', sans-serif;}
        input[type="text"], input[type="password"], textarea {
            width: 100%; box-sizing: border-box; background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: var(--text); 
            padding: 0.8rem 1rem; font-size: 1rem; font-family: 'Pretendard', sans-serif; border-radius: 4px; margin-bottom: 1rem;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--red); }
        
        button { background: var(--text); color: var(--bg); border: none; padding: 0.8rem 1.5rem; font-size: 0.95rem; font-weight: 600; cursor: pointer; border-radius: 4px; transition: all 0.3s; }
        button:hover { background: #e0e0e0; }
        button.primary { background: var(--red); color: white; width: 100%; }
        button.primary:hover { background: var(--red-hover); box-shadow: 0 0 15px rgba(230,37,37,0.4); }
        button.sm { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
        button.danger { background: transparent; border: 1px solid var(--border); color: var(--text2); width: auto; }
        button.danger:hover { color: var(--red); background: var(--red-dim); border-color: var(--red);}

        .error { color: var(--red); font-size: 0.9rem; margin-top: 0.5rem; }
        
        #auth-section, #editor-section { display: none; }
        #auth-section.active, #editor-section.active { display: block; }
        
        /* Category Tabs */
        .tabs { display: flex; gap: 0.5rem; overflow-x: auto; margin-bottom: 2rem; padding-bottom: 0.5rem;}
        .tab-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text2); padding: 0.6rem 1.2rem; border-radius: 30px; white-space: nowrap;}
        .tab-btn.active { background: var(--red); color: white; border-color: var(--red); }
        .tab-btn:hover:not(.active) { background: #222; border-color: #555; }
        
        /* Video Grid */
        #cat-title { font-size: 1.5rem; margin-bottom: 1.5rem; border-left: 4px solid var(--red); padding-left: 10px;}
        .vid-grid { display: grid; gap: 1.5rem; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
        .vid-card { background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; transition: transform 0.2s;}
        .vid-card.dragging { opacity: 0.4; transform: scale(0.98); }
        .vid-thumb { position: relative; width: 100%; padding-bottom: 56.25%; background: #000; border-bottom: 1px solid var(--border);}
        .vid-thumb img { position: absolute; top:0; left:0; width: 100%; height: 100%; object-fit: cover; }
        .vid-info { padding: 1rem; flex: 1; display:flex; flex-direction:column; }
        .vid-title { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;}
        .vid-role-area { padding: 1rem; background: var(--surface); border-top: 1px solid var(--border); margin-top: auto;}
        .vid-role-area textarea { margin-bottom: 0; height: 140px; min-height: 100px; font-size: 0.9rem; background: rgba(0,0,0,0.3); padding: 0.8rem; line-height: 1.6; resize: vertical; box-sizing: border-box;}
        
        /* Profile Crop */
        .profile-crop-box { display: flex; gap: 2rem; align-items: flex-start; flex-wrap: wrap; }
        .profile-preview-wrap { flex-shrink: 0; }
        .profile-preview { width: 160px; height: 200px; border-radius: 4px; overflow: hidden; border: 1px solid var(--border); background: #000; position: relative; }
        .profile-preview img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 50%; display: block; }
        .profile-controls { flex: 1; min-width: 220px; }
        .slider-row { margin-bottom: 1.2rem; }
        .slider-row label { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; color: var(--text2); margin-bottom: 0.5rem; }
        .slider-row label span { color: var(--text); font-family: 'Space Grotesk', sans-serif; font-size: 0.8rem; }
        input[type="range"] { width: 100%; accent-color: var(--red); cursor: pointer; }
        .pos-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.4rem; margin-top: 1rem; }
        .pos-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 4px; color: var(--text2); font-size: 0.7rem; padding: 0.4rem; cursor: pointer; transition: all 0.2s; text-align: center; }
        .pos-btn:hover { border-color: var(--red); color: var(--red); }
        .pos-btn.active { background: var(--red); color: white; border-color: var(--red); }

        /* Design Item Editor */
        .design-item-card { background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; display: flex; gap: 0; margin-bottom: 1rem; }
        .design-item-card .di-preview { width: 140px; flex-shrink: 0; background: #000; position: relative; }
        .design-item-card .di-preview img { width: 100%; height: 100%; object-fit: cover; display: block; min-height: 100px; }
        .design-item-card .di-fields { flex: 1; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .design-item-card .di-fields input, .design-item-card .di-fields textarea { margin-bottom: 0; font-size: 0.88rem; padding: 0.6rem 0.8rem; background: rgba(255,255,255,0.05); }
        .design-item-card .di-fields textarea { height: 70px; resize: vertical; }
        .design-item-card .di-actions { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 0.3rem; }
        .add-design-btn { width: 100%; padding: 1rem; background: rgba(255,255,255,0.04); border: 1px dashed var(--border); border-radius: 6px; color: var(--text2); font-size: 0.95rem; cursor: pointer; transition: all 0.2s; margin-top: 0.5rem; }
        .add-design-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-dim); }

        /* Fixed Save Panel */
        .fixed-save {
            position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(26,26,26,0.95); border-top: 1px solid var(--border);
            padding: 1rem 2rem; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            display: none;
        }
        .fixed-save.active { display: flex; }
        
        .loader-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; flex-direction: column;
        }
        .loader-overlay p { color: white; font-size: 1.2rem; margin-top: 1rem; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--red); border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .fixed-save { flex-direction: column; gap:1rem; text-align:center; padding: 1rem; }
            .fixed-save p { font-size: 0.8rem; }
            .fixed-save button.primary { width: 100%; font-size: 1rem; padding: 0.8rem;}
            body { padding-bottom: 140px; }
        }
    </style>
</head>
<body>

<div class="loader-overlay" id="loader"><div class="spinner"></div><p id="loader-msg">로딩 중...</p></div>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2rem; border-bottom: 2px solid var(--border); padding-bottom: 1rem;">
        <h1>VISUAL ADMIN</h1>
        <button id="logout-btn" class="sm danger" style="display:none;" onclick="logout()">토큰 삭제 (로그아웃)</button>
    </div>
    
    <!-- Auth Section -->
    <div id="auth-section" class="active">
        <div class="box">
            <h2>GitHub 연동 설정</h2>
            <p style="color:var(--text2); font-size:0.95rem; line-height:1.6; margin-bottom:1.5rem;">
                GitHub에서 발급받은 <strong>Personal Access Token (클래식)</strong>을 로컬 브라우저에 저장하여 로그인합니다.<br>
                <span>※ `repo` 권한이 반드시 체크되어 있어야 합니다.</span>
            </p>
            <label>GitHub Personal Access Token 입력</label>
            <input type="password" id="gh-token" placeholder="ghp_XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX">
            <div id="auth-error" class="error"></div>
            <br><button class="primary" onclick="login()">데이터 불러오기 (로그인)</button>
        </div>
    </div>

    <!-- Editor Section -->
    <div id="editor-section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; flex-wrap:wrap; gap:1rem;">
            <div class="tabs" id="cat-tabs" style="margin-bottom:0; padding-bottom:0; border:none; flex:1;"></div>
            <button class="sm" style="background:#222; border:1px solid #444; color:var(--text2);" onclick="toggleCatEdit()">✏ 카테고리명 수정</button>
        </div>
        
        <div id="cat-edit-panel" style="display:none; background:rgba(0,0,0,0.5); border:1px solid var(--border); padding:1.5rem; border-radius:6px; margin-bottom:2rem;">
            <h3 style="margin-top:0; font-size:1rem; margin-bottom:1.5rem; color:var(--red);">고정 카테고리 이름 변경</h3>
            <div id="cat-edit-list"></div>
            <div style="text-align:right; margin-top:1rem;">
                <button class="sm primary" style="width:auto; padding:0.6rem 1.2rem;" onclick="applyCatNames()">적용하기</button>
            </div>
        </div>

        <!-- Profile Crop Editor -->
        <div class="box" id="profile-crop-box" style="display:none; margin-bottom:2rem;">
            <h2 style="margin-bottom:1.5rem;">📷 프로필 사진 표시 영역 설정</h2>
            <div class="profile-crop-box">
                <div class="profile-preview-wrap">
                    <label style="margin-bottom:0.5rem; display:block;">미리보기</label>
                    <div class="profile-preview">
                        <img id="profile-crop-img" src="assets/profile.jpg" alt="profile">
                    </div>
                </div>
                <div class="profile-controls">
                    <div class="slider-row">
                        <label>좌우 위치 (X) <span id="x-val">50%</span></label>
                        <input type="range" id="pos-x" min="0" max="100" value="50" oninput="updateCrop()">
                    </div>
                    <div class="slider-row">
                        <label>상하 위치 (Y) <span id="y-val">50%</span></label>
                        <input type="range" id="pos-y" min="0" max="100" value="50" oninput="updateCrop()">
                    </div>
                    <label style="font-size:0.85rem; color:var(--text2); margin-bottom:0.5rem; display:block;">빠른 위치 선택</label>
                    <div class="pos-grid">
                        <button class="pos-btn" onclick="setPos(0,0)">↖ 좌상단</button>
                        <button class="pos-btn" onclick="setPos(50,0)">↑ 상단</button>
                        <button class="pos-btn" onclick="setPos(100,0)">↗ 우상단</button>
                        <button class="pos-btn" onclick="setPos(0,50)">← 좌</button>
                        <button class="pos-btn active" onclick="setPos(50,50)">● 중앙</button>
                        <button class="pos-btn" onclick="setPos(100,50)">→ 우</button>
                        <button class="pos-btn" onclick="setPos(0,100)">↙ 좌하단</button>
                        <button class="pos-btn" onclick="setPos(50,100)">↓ 하단</button>
                        <button class="pos-btn" onclick="setPos(100,100)">↘ 우하단</button>
                    </div>
                </div>
            </div>
        </div>

        <h2 id="cat-title">카테고리를 선택해주세요</h2>
        <div class="vid-grid" id="vid-grid"></div>
    </div>
</div>

<div class="fixed-save" id="fixed-save">
    <p>★ 수정한 메모는 <strong>'GitHub에 덮어쓰기'</strong> 버튼을 눌러야 메인 사이트에 반영됩니다 (약 5초 소요)</p>
    <button class="primary" style="width:auto; padding:0.8rem 2rem;" onclick="saveToGithub()">🚀 변경사항 모아서 GitHub에 덮어쓰기 완료</button>
</div>

<script>
    const REPO_OWNER = 'h001715-cpu';
    const REPO_NAME = 'portfolio';
    const FILE_PATH = 'videos.json';
    
    let ghToken = localStorage.getItem('ghToken') || '';
    let fileSha = '';
    let videoData = null; // videos.json parsed object
    let categories = [];
    let YT_API_KEY = '';
    let currentCatId = '';

    // 한글 등 유니코드 지원 Base64
    function b64DecodeUnicode(str) {
        return decodeURIComponent(atob(str).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
    }
    function b64EncodeUnicode(str) {
        return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g,
            function toSolidBytes(match, p1) { return String.fromCharCode('0x' + p1); }));
    }

    if (ghToken) {
        document.getElementById('gh-token').value = ghToken;
        fetchData();
    }

    function showLoading(msg) { 
        var l = document.getElementById('loader');
        if(msg) {
            document.getElementById('loader-msg').innerText = msg;
            l.style.display = 'flex';
        } else {
            l.style.display = 'none';
        }
    }
    
    function login() {
        const val = document.getElementById('gh-token').value.trim();
        if(!val) return alert('토큰을 입력해주세요!');
        ghToken = val;
        localStorage.setItem('ghToken', ghToken);
        fetchData();
    }
    
    function logout() {
        localStorage.removeItem('ghToken');
        ghToken = '';
        document.getElementById('gh-token').value = '';
        document.getElementById('logout-btn').style.display = 'none';
        document.getElementById('editor-section').classList.remove('active');
        document.getElementById('fixed-save').classList.remove('active');
        document.getElementById('auth-section').classList.add('active');
    }

    async function fetchData() {
        document.getElementById('auth-error').textContent = '';
        showLoading("GitHub 서버에서 videos.json 연동 중...");
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}?t=${new Date().getTime()}`, {
                headers: { 'Authorization': `token ${ghToken}` }
            });
            if (!res.ok) throw new Error('인증 실패 혹은 저장소를 찾을 수 없습니다.');
            
            const data = await res.json();
            fileSha = data.sha;
            videoData = JSON.parse(b64DecodeUnicode(data.content.replace(/\n/g, '')));
            
            if(!videoData.roles) videoData.roles = {};
            YT_API_KEY = videoData.apiKey;
            categories = videoData.categories || [];
            
            document.getElementById('auth-section').classList.remove('active');
            document.getElementById('editor-section').classList.add('active');
            document.getElementById('logout-btn').style.display = 'inline-block';
            document.getElementById('fixed-save').classList.add('active');
            
            renderTabs();
            initProfileCrop();
            // 기본으로 첫 번째 탭 열기
            if(categories.length > 0) openCat(categories[0].id);
            
            showLoading(false);
        } catch(err) {
            console.error(err);
            document.getElementById('auth-error').textContent = err.message;
            logout();
            showLoading(false);
        }
    }

    function renderTabs() {
        const t = document.getElementById('cat-tabs');
        t.innerHTML = '';
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn';
            btn.id = 'tab-' + cat.id;
            btn.innerText = cat.name;
            btn.onclick = () => openCat(cat.id);
            t.appendChild(btn);
        });
        if(currentCatId) {
            const act = document.getElementById('tab-' + currentCatId);
            if(act) act.classList.add('active');
        }
    }

    function toggleCatEdit() {
        const p = document.getElementById('cat-edit-panel');
        if(p.style.display === 'none' || p.style.display === '') {
            const list = document.getElementById('cat-edit-list');
            list.innerHTML = '';
            categories.forEach(cat => {
                const thumbId = cat.thumb || '';
                list.innerHTML += `
                <div style="margin-bottom:1.8rem; padding-bottom:1.8rem; border-bottom:1px solid var(--border);">
                    <div style="display:flex; gap:1rem; align-items:center; margin-bottom:1rem;">
                        <span style="color:var(--text2); width:120px; font-size:0.85rem; font-family:'Space Grotesk',sans-serif; flex-shrink:0;">ID: ${cat.id}</span>
                        <div style="flex:1;">
                            <label style="margin-bottom:0.3rem;">카테고리 이름</label>
                            <input type="text" id="cat-input-${cat.id}" value="${cat.name.replace(/"/g, '&quot;')}" style="margin-bottom:0; background:rgba(255,255,255,0.05);">
                        </div>
                    </div>
                    <div style="display:flex; gap:1.5rem; align-items:flex-start;">
                        <div style="flex:1;">
                            <label style="margin-bottom:0.3rem;">썸네일 유튜브 영상 ID <span style="color:var(--text2); font-size:0.75rem;">(비워두면 플레이리스트 첫 영상 자동 사용)</span></label>
                            <input type="text" id="thumb-input-${cat.id}" value="${thumbId}" placeholder="예: dQw4w9WgXcQ" style="margin-bottom:0; background:rgba(255,255,255,0.05);" oninput="previewThumb('${cat.id}')">
                        </div>
                        <div style="flex-shrink:0; width:160px;">
                            <label style="margin-bottom:0.3rem;">미리보기</label>
                            <div style="position:relative; width:160px; padding-bottom:90px; background:#000; border:1px solid var(--border); border-radius:4px; overflow:hidden;">
                                <img id="thumb-preview-${cat.id}" src="${thumbId ? 'https://img.youtube.com/vi/'+thumbId+'/mqdefault.jpg' : ''}" style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; ${thumbId ? '' : 'display:none;'}">
                                <span id="thumb-empty-${cat.id}" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:0.7rem; color:var(--text2); text-align:center; ${thumbId ? 'display:none;' : ''}">미리보기 없음</span>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
            p.style.display = 'block';
        } else {
            p.style.display = 'none';
        }
    }

    function applyCatNames() {
        categories.forEach(cat => {
            const nameVal = document.getElementById('cat-input-' + cat.id).value.trim();
            if(nameVal) cat.name = nameVal;
            const thumbVal = document.getElementById('thumb-input-' + cat.id).value.trim();
            if(thumbVal) {
                cat.thumb = thumbVal;
            } else {
                delete cat.thumb;
            }
        });
        videoData.categories = categories;
        renderTabs();
        document.getElementById('cat-edit-panel').style.display = 'none';

        if(currentCatId) {
            const cat = categories.find(c => c.id === currentCatId);
            document.getElementById('cat-title').innerText = cat.name + " 카테고리 영상 스튜디오";
        }
        alert('적용되었습니다! 화면 하단의 [🚀 덮어쓰기] 버튼을 누르시면 실제 홈페이지에 최종 반영됩니다.');
    }

    function previewThumb(catId) {
        const val = document.getElementById('thumb-input-' + catId).value.trim();
        const img = document.getElementById('thumb-preview-' + catId);
        const empty = document.getElementById('thumb-empty-' + catId);
        if(val) {
            img.src = 'https://img.youtube.com/vi/' + val + '/mqdefault.jpg';
            img.style.display = '';
            empty.style.display = 'none';
        } else {
            img.src = '';
            img.style.display = 'none';
            empty.style.display = '';
        }
    }

    async function openCat(id) {
        currentCatId = id;
        const cat = categories.find(c => c.id === id);
        if(!cat) return;

        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        document.getElementById('cat-title').innerText = cat.name + " 카테고리";

        const g = document.getElementById('vid-grid');

        // 디자인/기획안 타입 분기
        if(cat.type === 'design' || cat.type === 'planning') {
            renderDesignEditor(cat);
            return;
        }

        document.getElementById('cat-title').innerText = cat.name + " 카테고리 영상 스튜디오";
        g.innerHTML = '<p style="color:var(--text2)">유튜브 영상 배열 불러오는 중...</p>';
        
        try {
            const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${cat.playlistId}&key=${YT_API_KEY}`;
            const r = await (await fetch(url)).json();
            if(r.error) throw new Error(r.error.message);
            
            let validItems = (r.items||[]).filter(i => {
                const t = i.snippet?.title;
                return i.snippet?.resourceId?.videoId && t !== 'Deleted video' && t !== 'Private video' && t !== '삭제된 동영상' && t !== '비공개 동영상';
            });
            
            // 기존에 저장된 순서가 있으면 우선 적용
            const savedOrder = videoData.sortOrder && videoData.sortOrder[id] ? videoData.sortOrder[id] : [];
            validItems.sort((a,b) => {
                let idxA = savedOrder.indexOf(a.snippet.resourceId.videoId);
                let idxB = savedOrder.indexOf(b.snippet.resourceId.videoId);
                if(idxA === -1) idxA = 9999;
                if(idxB === -1) idxB = 9999;
                return idxA - idxB;
            });
            
            g.innerHTML = '';
            if(validItems.length === 0) {
                g.innerHTML = '<p style="color:var(--text2)">이 플레이리스트에 표시할 영상이 없습니다.</p>';
                return;
            }
            
            validItems.forEach(item => {
                const vid = item.snippet.resourceId.videoId;
                const title = item.snippet.title;
                const savedRole = videoData.roles[vid] || '';
                
                const card = document.createElement('div');
                card.className = 'vid-card';
                card.draggable = true;
                card.dataset.vid = vid;
                card.innerHTML = `
                    <div class="drag-handle" style="background:var(--border); color:var(--text); text-align:center; padding:0.5rem; font-size:0.8rem; cursor:grab; font-weight:600;">
                        ✥ 마우스로 잡고 이리저리 움직여보세요 ✥
                    </div>
                    <div class="vid-thumb">
                        <img src="https://img.youtube.com/vi/${vid}/maxresdefault.jpg" onerror="this.src='https://img.youtube.com/vi/${vid}/hqdefault.jpg'">
                    </div>
                    <div class="vid-info">
                        <div class="vid-title" title="${title}">${title}</div>
                        <div style="font-size:0.75rem; color:var(--text2); margin-top:0.2rem;">ID: ${vid}</div>
                    </div>
                    <div class="vid-role-area">
                        <label>이 영상의 커스텀 설명 덮어쓰기</label>
                        <textarea placeholder="유튜브 설명 대신 이 내용이 노출됩니다." oninput="updateRole('${vid}', this.value)">${savedRole}</textarea>
                    </div>
                `;
                
                // Drag Events
                card.addEventListener('dragstart', () => { 
                    card.classList.add('dragging'); 
                });
                card.addEventListener('dragend', () => {
                    card.classList.remove('dragging');
                    updateSortOrder();
                });
                card.addEventListener('dragover', e => {
                    e.preventDefault();
                    const draggingItem = document.querySelector('.dragging');
                    if(draggingItem && draggingItem !== card) {
                        const box = card.getBoundingClientRect();
                        // 마우스 위치가 카드의 가로/세로 절반(중심)을 넘었는지 확인
                        const isAfter = (e.clientX > box.left + box.width / 2) || (e.clientY > box.top + box.height / 2);
                        if(isAfter) {
                            card.parentNode.insertBefore(draggingItem, card.nextSibling);
                        } else {
                            card.parentNode.insertBefore(draggingItem, card);
                        }
                    }
                });
                
                g.appendChild(card);
            });
            
        } catch(e) {
            g.innerHTML = `<p style="color:var(--red)">영상을 불러오지 못했습니다: ${e.message}</p>`;
        }
    }
    
    function initProfileCrop() {
        const pos = (videoData.profilePosition || '50% 50%').split(' ');
        const x = parseInt(pos[0]) || 50;
        const y = parseInt(pos[1]) || 50;
        document.getElementById('pos-x').value = x;
        document.getElementById('pos-y').value = y;
        document.getElementById('x-val').textContent = x + '%';
        document.getElementById('y-val').textContent = y + '%';
        const img = document.getElementById('profile-crop-img');
        img.style.objectPosition = x + '% ' + y + '%';
        updatePosButtons(x, y);
        document.getElementById('profile-crop-box').style.display = 'block';
    }

    function updateCrop() {
        const x = document.getElementById('pos-x').value;
        const y = document.getElementById('pos-y').value;
        document.getElementById('x-val').textContent = x + '%';
        document.getElementById('y-val').textContent = y + '%';
        document.getElementById('profile-crop-img').style.objectPosition = x + '% ' + y + '%';
        videoData.profilePosition = x + '% ' + y + '%';
        updatePosButtons(parseInt(x), parseInt(y));
    }

    function setPos(x, y) {
        document.getElementById('pos-x').value = x;
        document.getElementById('pos-y').value = y;
        updateCrop();
    }

    function updatePosButtons(x, y) {
        document.querySelectorAll('.pos-btn').forEach(btn => btn.classList.remove('active'));
        const map = {'0,0':0,'50,0':1,'100,0':2,'0,50':3,'50,50':4,'100,50':5,'0,100':6,'50,100':7,'100,100':8};
        const idx = map[x+','+y];
        if(idx !== undefined) document.querySelectorAll('.pos-btn')[idx].classList.add('active');
    }

    function renderDesignEditor(cat) {
        if(!cat.items) cat.items = [];
        const g = document.getElementById('vid-grid');
        g.innerHTML = '';

        function buildCard(item, idx) {
            const card = document.createElement('div');
            card.className = 'design-item-card';
            card.innerHTML = `
                <div class="di-preview">
                    <img src="${item.img || ''}" onerror="this.style.display='none'" style="${item.img ? '' : 'display:none;'}">
                </div>
                <div class="di-fields">
                    <label style="margin-bottom:0.2rem; font-size:0.78rem;">제목</label>
                    <input type="text" value="${(item.title||'').replace(/"/g,'&quot;')}" placeholder="작품 제목" oninput="updateDesignItem('${cat.id}',${idx},'title',this.value)">
                    <label style="margin-bottom:0.2rem; font-size:0.78rem;">이미지 URL <span style="color:var(--text2); font-size:0.72rem;">(GitHub raw 또는 외부 이미지 링크)</span></label>
                    <input type="text" value="${(item.img||'').replace(/"/g,'&quot;')}" placeholder="https://..." oninput="updateDesignItem('${cat.id}',${idx},'img',this.value); previewDesignImg(this, ${idx})">
                    <label style="margin-bottom:0.2rem; font-size:0.78rem;">설명 <span style="color:var(--text2); font-size:0.72rem;">(선택)</span></label>
                    <textarea placeholder="작품 설명을 입력하세요" oninput="updateDesignItem('${cat.id}',${idx},'desc',this.value)">${(item.desc||'').replace(/</g,'&lt;')}</textarea>
                    <label style="margin-bottom:0.2rem; font-size:0.78rem;">파일 링크 <span style="color:var(--text2); font-size:0.72rem;">(선택 - PDF, 구글드라이브 등)</span></label>
                    <input type="text" value="${(item.link||'').replace(/"/g,'&quot;')}" placeholder="https://..." oninput="updateDesignItem('${cat.id}',${idx},'link',this.value)">
                    <div class="di-actions">
                        <button class="sm danger" onclick="removeDesignItem('${cat.id}',${idx})">삭제</button>
                    </div>
                </div>
            `;
            // preview img on load
            const imgInput = card.querySelectorAll('input')[1];
            const previewImg = card.querySelector('.di-preview img');
            imgInput._preview = previewImg;
            return card;
        }

        cat.items.forEach((item, idx) => g.appendChild(buildCard(item, idx)));

        const addBtn = document.createElement('button');
        addBtn.className = 'add-design-btn';
        addBtn.textContent = '+ 새 작품 추가';
        addBtn.onclick = () => {
            cat.items.push({ title: '', img: '', desc: '', link: '' });
            videoData.categories = categories;
            renderDesignEditor(cat);
        };
        g.appendChild(addBtn);
    }

    function updateDesignItem(catId, idx, field, value) {
        const cat = categories.find(c => c.id === catId);
        if(!cat || !cat.items || !cat.items[idx]) return;
        cat.items[idx][field] = value;
        videoData.categories = categories;
    }

    function previewDesignImg(input, idx) {
        const previewImg = input._preview || input.closest('.design-item-card').querySelector('.di-preview img');
        if(!previewImg) return;
        const val = input.value.trim();
        if(val) { previewImg.style.display = ''; previewImg.src = val; }
        else { previewImg.style.display = 'none'; }
    }

    function removeDesignItem(catId, idx) {
        const cat = categories.find(c => c.id === catId);
        if(!cat || !cat.items) return;
        cat.items.splice(idx, 1);
        videoData.categories = categories;
        renderDesignEditor(cat);
    }

    function updateSortOrder() {
        if(!videoData.sortOrder) videoData.sortOrder = {};
        const g = document.getElementById('vid-grid');
        const order = [...g.querySelectorAll('.vid-card')].map(c => c.dataset.vid);
        videoData.sortOrder[currentCatId] = order;
    }

    // Textarea oninput event
    function updateRole(vid, val) {
        if(!val.trim()) {
            delete videoData.roles[vid];
        } else {
            videoData.roles[vid] = val;
        }
    }

    async function saveToGithub() {
        if(!videoData) return;
        showLoading("GitHub 원격 저장소에 새로운 코드를 덮어쓰고 있습니다! (Vercel 배포 트리거)");
        try {
            const jsonStr = JSON.stringify(videoData, null, 2);
            const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${ghToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: 'Admin Panel Update: Custom Roles using Visual Editor',
                    content: b64EncodeUnicode(jsonStr),
                    sha: fileSha
                })
            });
            
            if(!res.ok) {
                const errData = await res.json();
                throw new Error(errData.message || '업데이트에 실패했습니다.');
            }
            
            const newData = await res.json();
            fileSha = newData.content.sha;
            
            showLoading(false);
            alert('🎉 성공적으로 깃허브 저장 & 배포 지시가 완료되었습니다!\n\nVercel이 변경된 파일을 감지하여 배포 중이므로, 약 5~10초 후 메인 사이트(포트폴리오 도메인)에 접속하여 확인해보세요!');
        } catch(err) {
            alert('오류가 발생했습니다: ' + err.message);
            showLoading(false);
        }
    }
</script>
